repos:
  - repo: local
    hooks:
      - id: flake8
        name: flake8 (local)
        entry: flake8
        language: system
        types: [python]
        additional_dependencies: []

# Note: using a local flake8 hook avoids network fetches during pre-commit environment
# initialization in constrained environments. CI still installs requirements-dev.txt
# so flake8 + plugins will be available.

# Install: pip install -r requirements-dev.txt
# Enable: pre-commit install
# Run manually: pre-commit run --all-files
