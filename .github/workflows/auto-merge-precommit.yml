name: Auto-merge precommit fixes

on:
  pull_request_target:
    types: [opened, labeled, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR and merge small auto-fix PRs
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in context; exiting.');
              return;
            }
            const branch = pr.head.ref || '';
            const title = pr.title || '';
            const author = pr.user && pr.user.login || '';
            core.info(`PR #${pr.number} by ${author}: ${title} (${branch})`);

            // Only auto-merge branches created by precommit-autofix job
            if (!branch.startsWith('precommit-fixes/')) {
              core.info('Branch does not match precommit pattern; skipping');
              return;
            }

            // Only proceed when PR is created by GitHub Actions or the automated bot
            const allowedAuthors = ['github-actions[bot]', 'github-actions'];
            if (!allowedAuthors.includes(author)) {
              core.info('Author not allowed for auto-merge; skipping');
              return;
            }

            // Fetch list of files changed
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            core.info(`${files.length} files changed in PR #${pr.number}`);

            // Guard: only auto-merge small PRs
            const MAX_FILES = 15;
            if (files.length > MAX_FILES) {
              core.info(`PR changes exceed ${MAX_FILES} files; skipping auto-merge`);
              return;
            }

            // Check for CI status (checks/pending) - ensure all checks passed
            const combined = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            core.info(`Combined status: ${combined.data.state}`);
            if (combined.data.state !== 'success' && combined.data.state !== 'neutral') {
              core.info('Required checks have not succeeded; skipping auto-merge');
              return;
            }

            // Merge PR
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              commit_title: `Auto-merge: ${title}`,
              merge_method: 'squash',
            });

            core.info(`PR #${pr.number} merged automatically`);
